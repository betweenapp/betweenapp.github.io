<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>between</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#090909;
color:white;
padding:24px;
}

.container{
max-width:430px;
margin:auto;
padding-top:60px;
}

h1{
font-size:34px;
margin-bottom:12px;
}

.subtitle{
opacity:.7;
line-height:1.5;
margin-bottom:30px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#1a1a1a;
color:white;
font-size:16px;
margin-bottom:16px;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:white;
color:black;
font-size:18px;
font-weight:600;
cursor:pointer;
}

.success{
margin-top:20px;
text-align:center;
display:none;
color:#7cff9d;
}

</style>

</head>
<body>

<div class="container">

<h1>Получить полный разбор</h1>

<div class="subtitle">
Оставьте Telegram и мы пришлём персональный анализ.
</div>

<input
id="telegram"
placeholder="@username"
/>

<button onclick="saveLead()">
Получить анализ
</button>

<div
class="success"
id="success">
Заявка отправлена 💜
</div>

</div>

<script>

const supabaseUrl =
'https://zftffpngezokbcbszyvw.supabase.co';

const supabaseKey =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmdGZmcG5nZXpva2JjYnN6eXZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDUzMDUsImV4cCI6MjA5NjY4MTMwNX0.I3BPJZVs-IN64ZNiJHbP8RRfm-RPQYbjyya6AdV00FU';

const supabase =
window.supabase.createClient(
supabaseUrl,
supabaseKey
);

async function saveLead(){

alert('Кнопка нажалась');

const telegram =
document.getElementById('telegram').value;

const chat =
localStorage.getItem('chat') || '';

if(!telegram){
alert('Введите Telegram');
return;
}

const { error } =
await supabase
.from('Leads')
.insert([
{
name: telegram,
chat: chat
}
]);

if(error){

console.log(error);

alert(
'Ошибка: ' +
error.message
);

}else{

alert('Сохранено!');

document.getElementById(
'success'
).style.display='block';

}

}

</script>

</body>
<script>
alert('Страница загрузилась');
</script>
</html>
