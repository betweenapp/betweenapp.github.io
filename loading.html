<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>between</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
background:#090909;
color:white;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.bg{
position:fixed;
inset:0;
z-index:-1;
background:
radial-gradient(circle at top,#3f2a68 0%,transparent 35%),
radial-gradient(circle at bottom,#1d365f 0%,transparent 35%),
#090909;
}

.container{
text-align:center;
padding:30px;
max-width:380px;
}

.loader{
width:90px;
height:90px;
border-radius:50%;
border:4px solid rgba(255,255,255,.08);
border-top:4px solid white;
margin:auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

h1{
margin-top:35px;
font-size:32px;
line-height:1.2;
}

.text{
margin-top:16px;
color:rgba(255,255,255,.6);
line-height:1.5;
}

.step{
margin-top:35px;
font-size:15px;
opacity:.8;
min-height:24px;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="loader"></div>

<h1>
Анализируем переписку
</h1>

<div class="text">
Ищем признаки заинтересованности,
инициативы и эмоциональные паттерны
</div>

<div class="step" id="step">
Загружаем сообщения...
</div>

</div>

<script>

const steps = [
"Загружаем сообщения...",
"Анализируем инициативу...",
"Ищем эмоциональные сигналы...",
"Формируем рекомендации..."
];

let current = 0;

setInterval(() => {

current++;

if(current < steps.length){
document.getElementById("step").innerText = steps[current];
}

}, 1200);

setTimeout(() => {
window.location.href = "result.html";
}, 5000);

</script>

</body>
</html>
